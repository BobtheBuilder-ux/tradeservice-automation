name: Retired Backend Deploy

on:
  workflow_dispatch:

concurrency:
  group: retired-backend-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  retired:
    name: Backend deploy is retired
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Explain retired backend runtime
        run: |
          echo "The local backend deploy has been retired."
          echo "Use frontend/, functions/, migrations/, and InsForge instead."
