name: Deploy Backend to Hostinger

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docker-compose.backend.yml'
      - '.github/workflows/deploy-backend-hostinger.yml'
  workflow_dispatch:

concurrency:
  group: hostinger-backend-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Build and deploy backend Docker container
    runs-on: [self-hosted, Linux, X64, hostinger, tradeservice-backend]
    timeout-minutes: 30

    steps:
      - name: Verify self-hosted runner
        shell: bash
        run: |
          set -euo pipefail
          hostname
          whoami
          docker --version
          docker compose version
          sudo -n /usr/local/bin/deploy-tradeservice-backend --check

      - name: Deploy backend on Hostinger VPS
        shell: bash
        run: |
          set -euo pipefail
          sudo -n /usr/local/bin/deploy-tradeservice-backend
