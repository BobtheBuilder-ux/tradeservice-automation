name: Deploy App to Hostinger

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'voice-bridge/**'
      - 'docker-compose.backend.yml'
      - '.github/workflows/deploy-backend-hostinger.yml'
  workflow_dispatch:

concurrency:
  group: hostinger-app-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Build and deploy frontend and voice bridge Docker containers
    runs-on: [self-hosted, Linux, X64, hostinger, tradeservice-backend]
    timeout-minutes: 45

    steps:
      - name: Verify self-hosted runner
        shell: bash
        run: |
          set -euo pipefail
          hostname
          whoami
          docker --version
          docker compose version
          sudo -n /usr/local/bin/deploy-tradeservice-app --check

      - name: Deploy app on Hostinger VPS
        shell: bash
        run: |
          set -euo pipefail
          sudo -n /usr/local/bin/deploy-tradeservice-app
