# Retired.
#
# The local backend container is no longer part of the active runtime. Product
# work now runs through frontend/, InsForge SDK/RPC, functions/, and migrations/.
# This compose file intentionally does not build ./backend.

services:
  backend-retired:
    image: alpine:3.20
    profiles:
      - retired-backend
    command:
      - sh
      - -c
      - echo "Local backend is retired. Use frontend/, functions/, migrations/, and InsForge."
