services:
  voice-bridge:
    build:
      context: ./voice-bridge
      dockerfile: Dockerfile
    image: tradeservice-voice-bridge:latest
    container_name: tradeservice-voice-bridge
    restart: unless-stopped
    env_file:
      - ./.env.voice-bridge.production
    environment:
      NODE_ENV: production
      PORT: 8080
    ports:
      - "8080:8080"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tradeservice-voice-bridge.rule=Host(`automation.setmymeet.ca`)"
      - "traefik.http.routers.tradeservice-voice-bridge.entrypoints=websecure"
      - "traefik.http.routers.tradeservice-voice-bridge.tls=true"
      - "traefik.http.routers.tradeservice-voice-bridge.tls.certresolver=letsencrypt"
      - "traefik.http.services.tradeservice-voice-bridge.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
